# Server
server.port=8080
spring.application.name=ai-document-search

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/projects
spring.datasource.username=postgres
spring.datasource.password=220524xx
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Local Python Embedding Server
embedding.server.url=http://localhost:5001

# Gemini API (free tier)
gemini.api.key=xxxxxxxxxxxxxxxx
gemini.model=gemini-2.5-flash

# RAG settings
rag.chunk.size=500
rag.chunk.overlap=50
rag.top-k=5

# JWT
jwt.secret=aidocument@2024#secret!xxxxxxxxxxxx
jwt.expiration=86400000

# Gmail SMTP (for OTP emails)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=jaipxxxx@gmail.com
spring.mail.password=xxxxxxxxxxxxxx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS
cors.allowed-origins=http://localhost:3000
