# Server
server.port=8080
spring.application.name=ai-document-search

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/projects
spring.datasource.username=postgres
spring.datasource.password=220524xx
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Local Python Embedding Server
embedding.server.url=http://localhost:5001

# Groq API (free - get key at console.groq.com)
groq.api.key=xxxxxxxxxxxx
groq.model=llama-3.3-70b-versatile

# RAG settings
rag.chunk.size=500
rag.chunk.overlap=50
rag.top-k=5

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS
cors.allowed-origins=http://localhost:3000